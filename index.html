<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NS</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Inter", sans-serif;
  scroll-behavior: smooth;
}

html, body {
  height: 100%;
  overflow-x: hidden;
}

body {
  background: linear-gradient(135deg, #0a58ff, #eaf3ff);
  color: #0b1220;

  overflow-y: auto;
  scrollbar-width: none;
  -ms-overflow-style: none;
}

body::-webkit-scrollbar {
  display: none;
}

/* BACKGROUND */
.bg {
  position: fixed;
  inset: 0;
  background:
    radial-gradient(circle at 30% 30%, rgba(255,255,255,0.6), transparent 55%),
    radial-gradient(circle at 70% 70%, rgba(0,100,255,0.25), transparent 60%);
  z-index: -1;
}

/* INTRO */
.intro {
  position: fixed;
  inset: 0;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;

  background: rgba(255,255,255,0.18);
  backdrop-filter: blur(16px);
  z-index: 999;
}

/* BUTTON */
.btn {
  width: 90px;
  height: 90px;
  border-radius: 50%;
  border: 1px solid rgba(0,0,0,0.2);
  background: rgba(255,255,255,0.6);
  cursor: pointer;
  position: relative;
}

.btn::before {
  content: "";
  position: absolute;
  inset: -12px;
  border-radius: 50%;
  border: 1px solid rgba(0,100,255,0.3);
  animation: pulse 1.8s infinite;
}

@keyframes pulse {
  0% { transform: scale(1); opacity: 0.7; }
  100% { transform: scale(1.4); opacity: 0; }
}

/* intro text */
.intro-text {
  margin-top: 18px;
  font-size: 12px;
  letter-spacing: 3px;
  color: rgba(0,0,0,0.6);
  animation: blink 2s infinite;
}

@keyframes blink {
  0%,100% { opacity: 1; }
  50% { opacity: 0.4; }
}

/* MAIN */
.main {
  opacity: 0;
  transform: translateY(15px);
  transition: 0.8s ease;
}

.container {
  max-width: 820px;
  margin: auto;
  padding: 120px 20px 200px;
  text-align: center;
}

/* HEADER */
.logo {
  font-size: 64px;
  font-weight: 600;
  letter-spacing: 10px;
}

.sub {
  font-size: 12px;
  margin-top: 6px;
  color: rgba(0,0,0,0.6);
}

/* RGB SIGNATURE */
.rgb {
  margin-top: 10px;
  font-size: 11px;
  letter-spacing: 3px;
  font-weight: 600;

  background: linear-gradient(90deg, red, blue, lime, cyan, magenta, red);
  background-size: 300% 100%;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;

  animation: rgb 3.5s linear infinite;
}

@keyframes rgb {
  0% { background-position: 0% 50%; }
  100% { background-position: 100% 50%; }
}

/* SECTION */
.section {
  margin-top: 80px;
  text-align: left;
}

.title {
  font-size: 10px;
  letter-spacing: 3px;
  color: rgba(0,0,0,0.5);
  margin-bottom: 18px;
}

/* CARD */
.card {
  padding: 14px 16px;
  border-radius: 12px;
  background: rgba(255,255,255,0.45);
  border: 1px solid rgba(0,0,0,0.08);
  margin-bottom: 10px;
  transition: 0.2s;
}

.card:hover {
  transform: translateX(6px);
}

/* LINKS */
.linkbox {
  padding: 14px 16px;
  border-radius: 12px;
  background: rgba(255,255,255,0.45);
  border: 1px solid rgba(0,0,0,0.08);
  margin-bottom: 10px;
}

a {
  color: #0a4cff;
  text-decoration: none;
}

/* AUDIO */
audio {
  display: none;
}

</style>
</head>

<body>

<div class="bg"></div>

<!-- INTRO -->
<div class="intro" id="intro">
  <button class="btn" onclick="enter()"></button>
  <div class="intro-text">PENCET BULET DI BAWAH</div>
</div>

<!-- AUDIO -->
<audio id="bgMusic" loop>
  <source src="/music/bg.mp3" type="audio/mpeg">
</audio>

<!-- MAIN -->
<div class="main" id="main">

<div class="container">

  <div class="logo">NS</div>
  <div class="sub">Nggak Sehat</div>

  <div class="rgb">WEBSITE BY: KASHSPADE</div>

  <!-- MEMBERS -->
  <div class="section">
    <div class="title">MEMBERS</div>
    <div class="card">KevinSpade</div>
    <div class="card">Fizz</div>
    <div class="card">Akuanta</div>
    <div class="card">HailSiguma</div>
    <div class="card">Kenzoo</div>
  </div>

  <!-- OTHER -->
  <div class="section">
    <div class="title">OTHER MEMBERS</div>
    <div class="card">RANDOM KID</div>
    <div class="card">hanjie707</div>
    <div class="card">paris</div>
    <div class="card">truechit</div>
  </div>

  <!-- LINKS -->
  <div class="section">
    <div class="title">LINKS</div>

    <div class="linkbox">
      Discord → <a href="https://discord.gg/zEq6t4y73N" target="_blank">join</a>
    </div>

    <div class="linkbox">
      YouTube → <a href="https://www.youtube.com/@kashspade" target="_blank">kashspade</a>
    </div>

  </div>

</div>

</div>

<script>
function enter() {
  document.getElementById("intro").style.display = "none";

  const main = document.getElementById("main");
  main.style.opacity = "1";
  main.style.transform = "translateY(0)";

  const music = document.getElementById("bgMusic");
  music.volume = 0.15;

  const play = music.play();
  if (play !== undefined) play.catch(() => {});
}
</script>

</body>
</html>
