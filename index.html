<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NS</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Inter", sans-serif;
}

body {
  background: #050505;
  color: #eaeaea;
  overflow: hidden;
}

/* subtle luxury background */
.bg {
  position: fixed;
  inset: 0;
  background: radial-gradient(circle at 30% 20%, #1a1a1a 0%, transparent 40%),
              radial-gradient(circle at 70% 80%, #111 0%, transparent 40%),
              #050505;
}

/* INTRO */
.intro {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.95);
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 999;
  flex-direction: column;
  gap: 20px;
}

.circle {
  width: 78px;
  height: 78px;
  border-radius: 50%;
  border: 1px solid #2a2a2a;
  background: transparent;
  cursor: pointer;
  transition: 0.3s;
}

.circle:hover {
  transform: scale(1.08);
  background: #fff;
}

/* MAIN */
.main {
  opacity: 0;
  transform: translateY(20px);
  transition: 1s ease;
  position: relative;
  z-index: 2;
}

.container {
  max-width: 780px;
  margin: auto;
  padding: 140px 20px;
  text-align: center;
}

/* LOGO */
.logo {
  font-size: 64px;
  font-weight: 600;
  letter-spacing: 10px;
  margin-bottom: 10px;
}

.sub {
  color: #777;
  font-size: 13px;
  letter-spacing: 2px;
}

/* SECTION */
.section {
  margin-top: 80px;
  text-align: left;
}

/* TITLE */
.title {
  font-size: 10px;
  letter-spacing: 3px;
  color: #666;
  margin-bottom: 25px;
  text-transform: uppercase;
}

/* CARD (luxury minimal) */
.card {
  padding: 18px 20px;
  border-radius: 14px;
  border: 1px solid rgba(255,255,255,0.06);
  background: rgba(255,255,255,0.02);
  margin-bottom: 12px;
  transition: 0.25s;
}

.card:hover {
  transform: translateX(6px);
  border-color: rgba(255,255,255,0.12);
}

.name {
  font-size: 15px;
  font-weight: 500;
  letter-spacing: 0.3px;
}

/* LINKS */
.links {
  margin-top: 80px;
}

.linkbox {
  padding: 16px 20px;
  border-radius: 14px;
  border: 1px solid rgba(255,255,255,0.06);
  background: rgba(255,255,255,0.02);
  margin-bottom: 12px;
  text-align: left;
}

a {
  color: #aaa;
  text-decoration: none;
}

a:hover {
  color: #fff;
}

/* fade in effect */
.fade {
  animation: fadeIn 1.2s ease forwards;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

/* MUSIC */
audio { display:none; }

</style>
</head>

<body>

<div class="bg"></div>

<!-- INTRO -->
<div class="intro" id="intro">
  <button class="circle" onclick="enter()"></button>
</div>

<!-- MAIN -->
<div class="main" id="main">

<div class="container fade">

  <div class="logo">NS</div>
  <div class="sub">Nggak Sehat</div>

  <!-- MEMBERS -->
  <div class="section">
    <div class="title">Members</div>

    <div class="card"><div class="name">KevinSpade</div></div>
    <div class="card"><div class="name">Fizz</div></div>
    <div class="card"><div class="name">Akuanta</div></div>
    <div class="card"><div class="name">HailSiguma</div></div>
    <div class="card"><div class="name">Kenzoo</div></div>

  </div>

  <!-- LINKS -->
  <div class="links">

    <div class="title">Links</div>

    <div class="linkbox">
      Discord → <a href="https://discord.gg/zEq6t4y73N" target="_blank">join server</a>
    </div>

    <div class="linkbox">
      YouTube → <a href="https://www.youtube.com/@kashspade" target="_blank">kashspade</a>
    </div>

  </div>

</div>

</div>

<!-- MUSIC -->
<audio id="bgMusic" loop>
  <source src="/music/bg.mp3" type="audio/mpeg">
</audio>

<script>
function enter() {
  document.getElementById("intro").style.display = "none";

  const main = document.getElementById("main");
  main.style.opacity = "1";
  main.style.transform = "translateY(0)";

  const music = document.getElementById("bgMusic");
  music.volume = 0.18;
  music.play().catch(()=>{});
}
</script>

</body>
</html>
