<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NS GOD MODE</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Inter;
  scroll-behavior: smooth;
}

/* 🔥 FULL HIDE SCROLLBAR (ALL BROWSER FIX) */
html, body {
  height: 100%;
  overflow-y: scroll;
  overflow-x: hidden;

  -ms-overflow-style: none;  /* IE/Edge */
  scrollbar-width: none;     /* Firefox */
}

body::-webkit-scrollbar {
  width: 0px;
  height: 0px;
}

/* BACKGROUND */
body {
  background: linear-gradient(135deg, #0a58ff, #eaf3ff);
  color: #0b1220;
}

/* BG GLOW */
.bg {
  position: fixed;
  inset: 0;
  background:
    radial-gradient(circle at 30% 30%, rgba(255,255,255,0.7), transparent 55%),
    radial-gradient(circle at 70% 70%, rgba(0,100,255,0.25), transparent 60%);
  z-index: -1;
}

/* NAV */
.nav {
  display: flex;
  justify-content: space-between;
  padding: 20px 40px;
  font-size: 12px;
  letter-spacing: 3px;
  color: rgba(0,0,0,0.6);
}

/* LAYOUT */
.container {
  max-width: 1100px;
  margin: auto;
  padding: 80px 20px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 60px;
  align-items: center;
}

/* TITLE */
.title {
  font-size: 72px;
  font-weight: 600;
  letter-spacing: 8px;
}

.rgb {
  margin-top: 10px;
  font-size: 11px;
  letter-spacing: 3px;
  background: linear-gradient(90deg, red, blue, lime, cyan, magenta, red);
  background-size: 300% 100%;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  animation: rgb 4s linear infinite;
}

@keyframes rgb {
  0% { background-position: 0%; }
  100% { background-position: 100%; }
}

/* COUNTDOWN */
.countdown {
  margin-top: 18px;
  font-size: 20px;
  font-weight: 600;
}

/* BUTTON */
.btn {
  margin-top: 20px;
  padding: 12px 16px;
  border-radius: 12px;
  border: 1px solid rgba(0,0,0,0.2);
  background: rgba(255,255,255,0.5);
  cursor: pointer;
  transition: 0.2s;
}

.btn:hover {
  transform: translateY(-2px);
  background: white;
}

/* SHIRT */
.shirt-wrap {
  perspective: 1000px;
  display: flex;
  justify-content: center;
}

.shirt {
  width: 360px;
  filter: drop-shadow(0 30px 50px rgba(0,0,0,0.25));
  transition: transform 0.1s;
}

/* SECTIONS */
.section {
  max-width: 900px;
  margin: 90px auto;
  padding: 0 20px;
}

.section-title {
  font-size: 10px;
  letter-spacing: 3px;
  color: rgba(0,0,0,0.5);
  margin-bottom: 18px;
}

.card {
  padding: 14px 16px;
  border-radius: 12px;
  background: rgba(255,255,255,0.45);
  margin-bottom: 10px;
  border: 1px solid rgba(0,0,0,0.08);
}

/* LINKS */
a {
  color: #0a4cff;
  text-decoration: none;
}

/* FOOTER */
footer {
  text-align: center;
  font-size: 11px;
  color: rgba(0,0,0,0.4);
  margin: 80px 0;
}
</style>
</head>

<body>

<div class="bg"></div>

<!-- NAV -->
<div class="nav">
  <div>NS-SPADE</div>
  <div>INFINITY DROP</div>
</div>

<!-- HERO -->
<div class="container">

  <div>
    <div class="title">NS SHIRT</div>
    <div class="rgb">WEBSITE BY: KASHSPADE</div>

    <div class="countdown" id="countdown"></div>

    <button class="btn">SOLD OUT</button>
  </div>

  <div class="shirt-wrap">
    <img src="/image/shirt.png" class="shirt" id="shirt"/>
  </div>

</div>

<!-- LINKS -->
<div class="section">
  <div class="section-title">LINKS</div>

  <div class="card">
    Discord → <a href="https://discord.gg/zEq6t4y73N">Discord Kashspade</a>
  </div>

  <div class="card">
    YouTube → <a href="https://www.youtube.com/@kashspade">Youtube Kashspade</a>
  </div>
</div>

<!-- MEMBERS -->
<div class="section">
  <div class="section-title">MEMBERS</div>
  <div class="card">KevinSpade</div>
  <div class="card">Fizz</div>
  <div class="card">Akuanta</div>
  <div class="card">HailSiguma</div>
  <div class="card">Kenzoo</div>
</div>

<!-- OTHER -->
<div class="section">
  <div class="section-title">OTHER MEMBERS</div>
  <div class="card">RANDOM KID</div>
  <div class="card">hanjie707</div>
  <div class="card">paris</div>
  <div class="card">truechit</div>
</div>

<footer>
  © 2026 NS-SPADE • infinity mode
</footer>

<script>
/* 3D SHIRT MOVE */
const shirt = document.getElementById("shirt");

document.addEventListener("mousemove", (e) => {
  const x = (window.innerWidth / 2 - e.clientX) / 25;
  const y = (window.innerHeight / 2 - e.clientY) / 25;

  shirt.style.transform = `rotateY(${x}deg) rotateX(${y}deg)`;
});

/* 🔥 24 JAM LOOP COUNTDOWN */
let time = 24 * 60 * 60;

setInterval(() => {
  let h = Math.floor(time / 3600);
  let m = Math.floor((time % 3600) / 60);
  let s = time % 60;

  document.getElementById("countdown").innerText =
    `LIMITED DROP: ${h}h ${m}m ${s}s`;

  time--;

  if (time < 0) time = 24 * 60 * 60;
}, 1000);
</script>

</body>
</html>
