<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NS</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Inter", sans-serif;
}

body {
  background: #020617;
  color: #eaeaea;
  overflow: hidden;
}

/* BLUE LUXURY BACKGROUND */
.bg {
  position: fixed;
  inset: 0;
  background:
    radial-gradient(circle at 20% 20%, rgba(0,140,255,0.25), transparent 45%),
    radial-gradient(circle at 80% 80%, rgba(0,90,255,0.18), transparent 50%),
    radial-gradient(circle at 50% 50%, rgba(0,180,255,0.08), #020617);
  animation: drift 12s ease-in-out infinite alternate;
}

@keyframes drift {
  0% { transform: scale(1); }
  100% { transform: scale(1.06); }
}

/* INTRO */
.intro {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.92);
  backdrop-filter: blur(10px);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  z-index: 999;
}

.text {
  font-size: 11px;
  letter-spacing: 4px;
  color: #6aaeff;
  margin-bottom: 20px;
  opacity: 0.8;
}

.btn {
  width: 78px;
  height: 78px;
  border-radius: 50%;
  border: 1px solid rgba(0,140,255,0.4);
  background: rgba(0,140,255,0.05);
  cursor: pointer;
  transition: 0.3s;
}

.btn:hover {
  background: rgba(0,140,255,0.2);
  transform: scale(1.1);
}

/* MAIN */
.main {
  opacity: 0;
  transform: translateY(20px);
  transition: 1s ease;
  position: relative;
  z-index: 2;
}

.container {
  max-width: 800px;
  margin: auto;
  padding: 130px 20px;
  text-align: center;
}

/* LOGO */
.logo {
  font-size: 70px;
  font-weight: 600;
  letter-spacing: 12px;
  color: #dbeafe;
}

.sub {
  font-size: 12px;
  color: #6b8bbd;
  letter-spacing: 3px;
  margin-top: 6px;
}

/* SECTION */
.section {
  margin-top: 80px;
  text-align: left;
}

.title {
  font-size: 10px;
  letter-spacing: 4px;
  color: #4d6fa8;
  margin-bottom: 20px;
}

/* CARD */
.card {
  padding: 16px 18px;
  border-radius: 14px;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(0,140,255,0.15);
  margin-bottom: 10px;
  transition: 0.25s;
}

.card:hover {
  transform: translateX(6px);
  border-color: rgba(0,140,255,0.4);
}

.name {
  font-size: 15px;
  color: #e5f0ff;
}

/* LINKS */
.links {
  margin-top: 80px;
  text-align: left;
}

.linkbox {
  padding: 16px 18px;
  border-radius: 14px;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(0,140,255,0.15);
  margin-bottom: 10px;
}

a {
  color: #8ab4ff;
  text-decoration: none;
}

a:hover {
  color: #ffffff;
}

/* MUSIC */
audio { display:none; }

</style>
</head>

<body>

<div class="bg"></div>

<!-- INTRO -->
<div class="intro" id="intro">
  <div class="text">CLICK TO ENTER NS</div>
  <button class="btn" onclick="enter()"></button>
</div>

<!-- MAIN -->
<div class="main" id="main">

<div class="container">

  <div class="logo">NS</div>
  <div class="sub">Nggak Sehat</div>

  <!-- MEMBERS -->
  <div class="section">
    <div class="title">MEMBERS</div>

    <div class="card"><div class="name">KevinSpade</div></div>
    <div class="card"><div class="name">Fizz</div></div>
    <div class="card"><div class="name">Akuanta</div></div>
    <div class="card"><div class="name">HailSiguma</div></div>
    <div class="card"><div class="name">Kenzoo</div></div>

  </div>

  <!-- LINKS -->
  <div class="links">

    <div class="title">LINKS</div>

    <div class="linkbox">
      Discord → <a href="https://discord.gg/zEq6t4y73N" target="_blank">join</a>
    </div>

    <div class="linkbox">
      YouTube → <a href="https://www.youtube.com/@kashspade" target="_blank">kashspade</a>
    </div>

  </div>

</div>

</div>

<!-- MUSIC -->
<audio id="bgMusic" loop>
  <source src="/music/bg.mp3" type="audio/mpeg">
</audio>

<script>
function enter() {
  document.getElementById("intro").style.display = "none";

  const main = document.getElementById("main");
  main.style.opacity = "1";
  main.style.transform = "translateY(0)";

  const music = document.getElementById("bgMusic");
  music.volume = 0.15;
  music.play().catch(()=>{});
}
</script>

</body>
</html>
