<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NS GOD MODE</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');

*{margin:0;padding:0;box-sizing:border-box;font-family:Inter;}

body{
  background:linear-gradient(135deg,#050b1f,#0a58ff);
  color:white;
  overflow-x:hidden;
}

/* container */
.container{
  max-width:1100px;
  margin:auto;
  padding:70px 20px;
  position:relative;
  z-index:2;
}

.title{font-size:58px;letter-spacing:6px;}
.sub{font-size:12px;opacity:.6;margin-bottom:30px;}

/* CARD */
.card{
  background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.12);
  padding:22px;
  border-radius:16px;
  margin-top:20px;
}

/* BTN */
.btn{
  padding:10px 14px;
  border-radius:10px;
  border:1px solid rgba(255,255,255,.15);
  background:rgba(255,255,255,.08);
  cursor:pointer;
  display:inline-block;
  margin-top:10px;
}

/* PROFILE */
#profile{
  display:none;
  margin-top:15px;
  align-items:center;
  gap:10px;
}
#profile img{
  width:40px;
  border-radius:50%;
}
</style>
</head>

<body>

<div class="container">

  <div class="title">NS GOD MODE</div>
  <div class="sub">WEBSITE BY: KASHSPADE</div>

  <!-- YOUR ORIGINAL CONTENT KEPT -->
  <div class="card">
    <div>STORE SYSTEM ACTIVE</div>
    <div class="btn">BUY</div>
  </div>

  <!-- DISCORD LOGIN -->
  <div class="card">
    <div class="btn" onclick="loginDiscord()">LOGIN DISCORD</div>

    <div id="profile">
      <img id="avatar">
      <div id="username"></div>
    </div>
  </div>

</div>

<script>

/* =========================
   ORIGINAL SYSTEM (SAFE)
========================= */
console.log("NS GOD MODE LOADED");

/* =========================
   DISCORD LOGIN SYSTEM
========================= */

const CLIENT_ID = "1505815802744672327";
const REDIRECT_URI = "https://ns-spade.vercel.app/api/callback";

/* LOGIN */
function loginDiscord(){
  window.location.href =
  `https://discord.com/oauth2/authorize?client_id=${CLIENT_ID}&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&response_type=code&scope=identify`;
}

/* LOAD PROFILE */
const user = JSON.parse(localStorage.getItem("discordUser"));

if(user){
  document.getElementById("profile").style.display="flex";
  document.getElementById("username").innerText=user.username;

  document.getElementById("avatar").src =
  `https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.png`;
}

</script>

</body>
</html>
