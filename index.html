<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NS</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Inter", sans-serif;
}

body {
  background: linear-gradient(135deg, #0a58ff, #eaf3ff);
  min-height: 100vh;
  color: #0b1220;
  overflow-y: auto; /* 🔥 FIX SCROLL */
  overflow-x: hidden;
}

/* background */
.bg {
  position: fixed;
  inset: 0;
  background:
    radial-gradient(circle at 30% 30%, rgba(255,255,255,0.5), transparent 50%),
    radial-gradient(circle at 70% 70%, rgba(0,100,255,0.2), transparent 55%);
  filter: blur(20px);
  z-index: -1;
}

/* intro */
.intro {
  position: fixed;
  inset: 0;
  display: flex;
  justify-content: center;
  align-items: center;
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(10px);
  z-index: 999;
}

.btn {
  width: 80px;
  height: 80px;
  border-radius: 50%;
  border: 1px solid rgba(0,0,0,0.15);
  background: rgba(255,255,255,0.4);
  cursor: pointer;
}

/* main */
.main {
  opacity: 0;
  transform: translateY(15px);
  transition: 1s ease;
}

.container {
  max-width: 820px;
  margin: auto;
  padding: 120px 20px;
  text-align: center;
}

/* header */
.logo {
  font-size: 64px;
  font-weight: 600;
  letter-spacing: 10px;
}

.sub {
  font-size: 12px;
  margin-top: 6px;
  color: rgba(0,0,0,0.6);
}

.signature {
  margin-top: 8px;
  font-size: 11px;
  letter-spacing: 3px;
  font-weight: 500;

  background: linear-gradient(90deg,#ff4d4d,#ffb84d,#fff94d,#4dff88,#4dd2ff,#b84dff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

/* section */
.section {
  margin-top: 80px;
  text-align: left;
}

.title {
  font-size: 10px;
  letter-spacing: 3px;
  color: rgba(0,0,0,0.5);
  margin-bottom: 18px;
}

/* card */
.card {
  padding: 14px 16px;
  border-radius: 12px;
  background: rgba(255,255,255,0.45);
  border: 1px solid rgba(0,0,0,0.08);
  margin-bottom: 10px;
}

.name {
  font-size: 15px;
  font-weight: 500;
}

/* footer section */
.bottom {
  margin-top: 100px;
  padding-bottom: 120px;
}

/* links */
.linkbox {
  padding: 14px 16px;
  border-radius: 12px;
  background: rgba(255,255,255,0.45);
  border: 1px solid rgba(0,0,0,0.08);
  margin-bottom: 10px;
}

a {
  color: #0a4cff;
  text-decoration: none;
}

</style>
</head>

<body>

<div class="bg"></div>

<!-- INTRO -->
<div class="intro" id="intro">
  <button class="btn" onclick="enter()"></button>
</div>

<!-- MAIN -->
<div class="main" id="main">

<div class="container">

  <div class="logo">NS</div>
  <div class="sub">Nggak Sehat</div>
  <div class="signature">WEBSITE BY: KASHSPADE</div>

  <!-- MEMBERS MAIN -->
  <div class="section">
    <div class="title">MEMBERS</div>

    <div class="card"><div class="name">KevinSpade</div></div>
    <div class="card"><div class="name">Fizz</div></div>
    <div class="card"><div class="name">Akuanta</div></div>
    <div class="card"><div class="name">HailSiguma</div></div>
    <div class="card"><div class="name">Kenzoo</div></div>

  </div>

  <!-- MEMBERS SECOND (SEPARATE) -->
  <div class="section">
    <div class="title">OTHER MEMBERS</div>

    <div class="card"><div class="name">RANDOM KID</div></div>
    <div class="card"><div class="name">hanjie707</div></div>
    <div class="card"><div class="name">paris</div></div>
    <div class="card"><div class="name">truechit</div></div>

  </div>

  <!-- LINKS -->
  <div class="bottom">

    <div class="section">
      <div class="title">LINKS</div>

      <div class="linkbox">
        Discord → <a href="https://discord.gg/zEq6t4y73N" target="_blank">join</a>
      </div>

      <div class="linkbox">
        YouTube → <a href="https://www.youtube.com/@kashspade" target="_blank">kashspade</a>
      </div>

    </div>

  </div>

</div>

</div>

<script>
function enter() {
  document.getElementById("intro").style.display = "none";

  const main = document.getElementById("main");
  main.style.opacity = "1";
  main.style.transform = "translateY(0)";
}
</script>

</body>
</html>
