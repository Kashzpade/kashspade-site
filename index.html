<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>alvaXzico Store</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<script src="https://www.google.com/recaptcha/api.js" async defer></script>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Poppins;
}

body{
  background:#070a12;
  color:white;
  overflow:hidden;
}

/* ===== MONEY BG (clean floating) ===== */
.money{
  position:fixed;
  top:-50px;
  font-size:18px;
  opacity:0.06;
  animation:fall linear infinite;
  pointer-events:none;
}

@keyframes fall{
  0%{transform:translateY(-100px);}
  100%{transform:translateY(120vh);}
}

/* LAYOUT */
.container{
  position:relative;
  z-index:2;
  text-align:center;
  padding:60px 20px;
}

.logo{
  font-size:22px;
  color:#c084fc;
  font-weight:600;
}

.card{
  margin:40px auto;
  width:340px;
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:14px;
  padding:25px;
  backdrop-filter: blur(10px);
}

.price{
  color:#22c55e;
  margin:10px 0;
  font-size:22px;
}

.btn{
  display:block;
  margin-top:15px;
  padding:10px;
  background:#25D366;
  border-radius:8px;
  color:white;
  text-decoration:none;
  font-weight:500;
}

/* RECAPTCHA */
.captcha{
  margin-top:15px;
  display:flex;
  justify-content:center;
}

/* MUSIC */
.music{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#111827;
  border:1px solid #1f2937;
  padding:10px 12px;
  border-radius:8px;
  cursor:pointer;
  font-size:12px;
}
</style>
</head>

<body>

<div class="container">
  <div class="logo">alvaXzico Store</div>

  <div class="card">
    <h3>🎰 SOLS RNG AFK</h3>
    <div class="price">1K / JAM</div>

    <p style="color:#aaa;font-size:13px;">
      Roblox AFK farming service
    </p>

    <!-- RECAPTCHA BENERAN -->
    <div class="captcha">
      <div class="g-recaptcha" data-sitekey="6LeHifgsAAAAAIPfuPu_gurv2EMHitkJ8Yr5-fCm"></div>
    </div>

    <a class="btn" href="https://wa.me/62895385584661">
      Order via WhatsApp
    </a>
  </div>
</div>

<!-- MUSIC -->
<audio id="bgm" loop>
  <source src="music/bg.mp3" type="audio/mpeg">
</audio>

<div class="music" onclick="toggleMusic()">🎵 Music</div>

<script>
let music = document.getElementById("bgm");
let play = false;

function toggleMusic(){
  if(!play){
    music.play();
    play = true;
  }else{
    music.pause();
    play = false;
  }
}

/* ===== CLEAN MONEY EFFECT ===== */
function spawnMoney(){
  const m = document.createElement("div");
  m.classList.add("money");
  m.innerHTML = "💸";

  m.style.left = Math.random() * window.innerWidth + "px";
  m.style.animationDuration = (6 + Math.random() * 6) + "s";

  document.body.appendChild(m);

  setTimeout(()=>m.remove(),12000);
}

setInterval(spawnMoney,400);
</script>

</body>
</html>
