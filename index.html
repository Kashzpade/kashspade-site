<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NS GOD MODE</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Inter;
}

/* BACKGROUND */
body {
  background: linear-gradient(135deg, #07122b, #0a58ff);
  overflow: hidden;
  color: white;
}

/* GHOST MONEY */
.money {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
}

.money span {
  position: absolute;
  opacity: 0.05;
  font-size: 28px;
  animation: float 12s linear infinite;
}

@keyframes float {
  from { transform: translateY(100vh); }
  to { transform: translateY(-10vh); }
}

/* LOCK SCREEN */
.lock {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(12px);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  z-index: 999;
}

.lock.hidden {
  opacity: 0;
  pointer-events: none;
  transition: 1s ease;
}

.lock h1 {
  font-size: 16px;
  margin-bottom: 20px;
  text-align: center;
}

/* RGB BAR */
.bar {
  width: 340px;
  height: 14px;
  border-radius: 999px;
  cursor: pointer;
  background: linear-gradient(90deg, red, orange, yellow, lime, cyan, blue, violet, red);
  background-size: 300% 100%;
  animation: rgb 3s linear infinite;
}

@keyframes rgb {
  0% { background-position: 0%; }
  100% { background-position: 100%; }
}

/* MAIN */
.main {
  filter: blur(25px);
  pointer-events: none;
  transition: 1s ease;
  position: relative;
  z-index: 2;
}

.main.unlocked {
  filter: blur(0);
  pointer-events: auto;
}

/* LAYOUT */
.container {
  max-width: 1100px;
  margin: auto;
  padding: 60px 20px;
}

/* TITLE */
.title {
  font-size: 60px;
  letter-spacing: 6px;
}

.sub {
  font-size: 12px;
  opacity: 0.7;
  margin-bottom: 40px;
}

/* SECTIONS */
.section {
  margin-top: 40px;
}

.section h2 {
  font-size: 10px;
  letter-spacing: 3px;
  opacity: 0.6;
  margin-bottom: 12px;
}

.card {
  padding: 12px 14px;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 12px;
  margin-bottom: 10px;
}

/* SHIRT */
.shirt {
  width: 220px;
  margin-top: 10px;
  filter: drop-shadow(0 20px 40px rgba(0,0,0,0.4));
}

/* LINKS */
a {
  color: #7fb3ff;
  text-decoration: none;
}
</style>
</head>

<body>

<!-- MONEY BG -->
<div class="money" id="money"></div>

<!-- AUDIO -->
<audio id="bgMusic" loop>
  <source src="/music/bg.mp3">
</audio>

<!-- LOCK -->
<div class="lock" id="lock">
  <h1 id="text">Click the bar if you believe in NS</h1>
  <div class="bar" onclick="unlock()"></div>
</div>

<!-- MAIN -->
<div class="main" id="main">

  <div class="container">

    <div class="title">NS SHIRT</div>
    <div class="sub">WEBSITE BY: KASHSPADE</div>

    <!-- SHIRT PRODUCT -->
    <div class="section">
      <h2>LIMITED DROP</h2>
      <div class="card">
        NS Shirt - $29.99 (SOLD OUT)
        <br>
        <img src="/image/shirt.png" class="shirt"/>
      </div>
    </div>

    <!-- LINKS -->
    <div class="section">
      <h2>LINKS</h2>
      <div class="card">
        Discord → <a href="https://discord.gg/zEq6t4y73N">Discord Kashspade</a>
      </div>
      <div class="card">
        YouTube → <a href="https://www.youtube.com/@kashspade">Youtube Kashspade</a>
      </div>
    </div>

    <!-- MEMBERS -->
    <div class="section">
      <h2>MEMBERS</h2>
      <div class="card">KevinSpade</div>
      <div class="card">Fizz</div>
      <div class="card">Akuanta</div>
      <div class="card">HailSiguma</div>
      <div class="card">Kenzoo</div>
    </div>

    <!-- OTHER -->
    <div class="section">
      <h2>OTHER MEMBERS</h2>
      <div class="card">RANDOM KID</div>
      <div class="card">hanjie707</div>
      <div class="card">paris</div>
      <div class="card">truechit</div>
    </div>

  </div>
</div>

<script>

/* MONEY GHOST */
const money = document.getElementById("money");
const em = ["💸","💰","🪙"];

for (let i=0;i<35;i++){
  let s=document.createElement("span");
  s.innerText = em[Math.floor(Math.random()*em.length)];
  s.style.left = Math.random()*100+"vw";
  s.style.top = Math.random()*100+"vh";
  s.style.fontSize = (20+Math.random()*30)+"px";
  s.style.animationDuration = (8+Math.random()*10)+"s";
  money.appendChild(s);
}

/* AUDIO + UNLOCK */
const music = document.getElementById("bgMusic");

function unlock(){
  document.getElementById("text").innerText = "NS SYSTEM ONLINE";

  setTimeout(()=>{
    document.getElementById("lock").classList.add("hidden");
    document.getElementById("main").classList.add("unlocked");

    music.volume = 0.4;
    music.play().catch(()=>{});
  },600);
}

</script>

</body>
</html>
