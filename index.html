<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>KashStore</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0a0f1c;
  color:white;
}

header{
  padding:20px;
  background:#111a2e;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

h1{
  color:#38bdf8;
}

.container{
  padding:20px;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
}

.card{
  background:#111a2e;
  padding:15px;
  border-radius:10px;
  border:1px solid #1f2a44;
}

button{
  padding:10px;
  width:100%;
  margin-top:10px;
  background:#38bdf8;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

button:hover{
  background:#0ea5e9;
}

.cart{
  position:fixed;
  right:0;
  top:0;
  width:300px;
  height:100%;
  background:#0f172a;
  padding:20px;
  border-left:1px solid #1f2a44;
}

.item{
  margin-bottom:10px;
}
</style>

</head>
<body>

<header>
  <h1>KashStore</h1>
  <div>🛒 Cart</div>
</header>

<div class="container" id="products"></div>

<div class="cart">
  <h3>Your Cart</h3>
  <div id="cart"></div>

  <button onclick="checkout()" style="margin-top:20px;background:green;">
    Checkout via DANA
  </button>
</div>

<script>

// 🧠 CART SYSTEM
let cart = [];

// 🔑 SUPABASE CONFIG (ISI INI)
const SUPABASE_URL = "https://tffyptzlonnalscrrcqc.supabase.co";
const SUPABASE_KEY = "ISI_PUBLISHABLE_KEY_LU";

// 🚀 AMBIL PRODUCTS DARI SUPABASE
async function loadProducts(){
  const res = await fetch(
    SUPABASE_URL + "/rest/v1/products?select=*",
    {
      headers: {
        apikey: SUPABASE_KEY,
        Authorization: "Bearer " + SUPABASE_KEY
      }
    }
  );

  const data = await res.json();
  renderProducts(data);
}

// 🎨 TAMPILKAN PRODUCT
function renderProducts(data){
  const container = document.getElementById("products");

  container.innerHTML = data.map(p => `
    <div class="card">
      <h3>${p.name}</h3>
      <p>Rp ${p.price}</p>
      <button onclick="addCart('${p.name}', ${p.price})">
        Add to Cart
      </button>
    </div>
  `).join("");
}

// 🛒 ADD TO CART
function addCart(name, price){
  cart.push({name, price});
  renderCart();
}

// 📦 RENDER CART
function renderCart(){
  document.getElementById("cart").innerHTML =
    cart.map(i => `<div class="item">${i.name} - Rp ${i.price}</div>`).join("");
}

// 💳 CHECKOUT (MANUAL DANA DULU)
function checkout(){
  if(cart.length === 0){
    alert("Cart kosong!");
    return;
  }

  let total = cart.reduce((a,b)=>a+b.price,0);

  alert(
    "TOTAL: Rp " + total +
    "\n\nBayar ke DANA: 08XXXXXXXXXX" +
    "\nKirim bukti ke WhatsApp"
  );
}

// START
loadProducts();

</script>

</body>
</html>
