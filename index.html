<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>alvaXzico Store</title>

<script src="https://www.google.com/recaptcha/api.js" async defer></script>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Poppins;
}

body{
  background:#070a12;
  color:white;
  overflow:hidden;
}

/* ===== MONEY BG ===== */
.money{
  position:fixed;
  top:-50px;
  font-size:18px;
  opacity:0.07;
  animation:fall linear infinite;
  pointer-events:none;
  z-index:1;
}

@keyframes fall{
  0%{transform:translateY(-100px);}
  100%{transform:translateY(120vh);}
}

/* ===== GATE ===== */
#gate{
  position:fixed;
  inset:0;
  background:#05060a;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:999;
}

.box{
  background:#111827;
  padding:25px;
  border-radius:12px;
  border:1px solid #1f2937;
  text-align:center;
  width:300px;
}

.btn{
  margin-top:15px;
  padding:10px 14px;
  background:#25D366;
  border:none;
  border-radius:8px;
  color:white;
  cursor:pointer;
  width:100%;
}

/* ===== STORE ===== */
#store{
  display:none;
  position:relative;
  z-index:2;
  text-align:center;
  padding:50px 20px;
}

.logo{
  font-size:22px;
  color:#c084fc;
  margin-bottom:30px;
}

/* CARD */
.card{
  width:320px;
  margin:0 auto;
  background:#111827;
  border:1px solid #1f2937;
  border-radius:14px;
  padding:20px;
}

.price{
  color:#22c55e;
  margin:10px 0;
}

/* BUTTON */
a{
  display:block;
  margin-top:10px;
  padding:10px;
  background:#25D366;
  color:white;
  text-decoration:none;
  border-radius:8px;
}

/* MUSIC BTN */
.music{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#111827;
  border:1px solid #1f2937;
  padding:10px;
  border-radius:8px;
  cursor:pointer;
  z-index:10;
}

/* CAPTCHA CENTER */
.g-recaptcha{
  display:flex;
  justify-content:center;
  margin-top:10px;
}
</style>
</head>

<body>

<!-- ===== MONEY BACKGROUND ===== -->
<script>
function spawnMoney(){
  const m = document.createElement("div");
  m.classList.add("money");
  m.innerHTML = "💸";

  m.style.left = Math.random() * window.innerWidth + "px";
  m.style.animationDuration = (5 + Math.random() * 5) + "s";

  document.body.appendChild(m);

  setTimeout(()=>m.remove(),10000);
}
setInterval(spawnMoney,400);
</script>

<!-- ===== GATE ===== -->
<div id="gate">
  <div class="box">
    <h3>Verify You’re Human</h3>

    <div class="g-recaptcha"
         data-sitekey="6Lcpi_gsAAAAAJkSCfedfELBpMgalzUt7G3C0O7-">
    </div>

    <button class="btn" onclick="enterSite()">Enter Store</button>
  </div>
</div>

<!-- ===== STORE ===== -->
<div id="store">

  <div class="logo">alvaXzico Store</div>

  <div class="card">
    <h3>🎰 SOLS RNG AFK</h3>
    <div class="price">1K / JAM</div>

    <p style="color:#aaa;font-size:13px;">
      Roblox AFK farming service
    </p>

    <a href="https://wa.me/62895385584661">
      Order via WhatsApp
    </a>
  </div>

</div>

<!-- MUSIC -->
<audio id="bgm" loop>
  <source src="music/bg.mp3" type="audio/mpeg">
</audio>

<div class="music" onclick="toggleMusic()">🎵 Music</div>

<script>
let music = document.getElementById("bgm");
let playing = false;

function toggleMusic(){
  if(!playing){
    music.play().catch(()=>{});
    playing = true;
  }else{
    music.pause();
    playing = false;
  }
}

function enterSite(){
  const resp = grecaptcha.getResponse();

  if(resp.length === 0){
    alert("Complete captcha dulu bro");
    return;
  }

  document.getElementById("gate").style.display = "none";
  document.getElementById("store").style.display = "block";

  // AUTO MUSIC (langsung hidup)
  music.play().catch(()=>{});
  playing = true;
}
</script>

</body>
</html>
