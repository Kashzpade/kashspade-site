<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NS</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Inter", sans-serif;
}

body {
  background: #050505;
  color: #eaeaea;
}

/* subtle background */
.bg {
  position: fixed;
  inset: 0;
  background: radial-gradient(circle at top, #111 0%, #050505 60%, #000 100%);
  z-index: 0;
}

/* intro */
.intro {
  position: fixed;
  inset: 0;
  background: #000;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 999;
}

.circle {
  width: 72px;
  height: 72px;
  border-radius: 50%;
  border: 1px solid #2a2a2a;
  background: transparent;
  cursor: pointer;
  transition: 0.2s;
}

.circle:hover {
  background: #fff;
}

/* main */
.main {
  opacity: 0;
  transform: translateY(10px);
  transition: 0.8s ease;
  position: relative;
  z-index: 2;
}

.container {
  max-width: 860px;
  margin: auto;
  padding: 100px 24px;
}

/* header */
.logo {
  font-size: 52px;
  font-weight: 600;
  letter-spacing: 6px;
}

.sub {
  margin-top: 6px;
  color: #777;
  font-size: 13px;
}

/* section spacing */
.section {
  margin-top: 70px;
}

/* title small */
.title {
  font-size: 11px;
  letter-spacing: 2px;
  color: #666;
  margin-bottom: 18px;
}

/* card */
.card {
  background: rgba(255,255,255,0.03);
  border: 1px solid #1b1b1b;
  padding: 14px 16px;
  border-radius: 12px;
  margin-bottom: 10px;
  transition: 0.2s;
}

.card:hover {
  border-color: #2a2a2a;
  transform: translateX(4px);
}

.name {
  font-weight: 500;
}

.desc {
  font-size: 13px;
  color: #777;
  margin-top: 3px;
}

/* links */
a {
  color: #aaa;
  text-decoration: none;
}

a:hover {
  color: #fff;
}

/* footer */
footer {
  margin-top: 100px;
  font-size: 12px;
  color: #444;
  text-align: center;
}

/* music */
audio {
  display: none;
}

</style>
</head>

<body>

<div class="bg"></div>

<!-- INTRO -->
<div class="intro" id="intro">
  <button class="circle" onclick="enter()"></button>
</div>

<!-- MAIN -->
<div class="main" id="main">

<div class="container">

  <div class="logo">NS</div>
  <div class="sub">Nggak Sehat</div>

  <!-- MEMBERS -->
  <div class="section">
    <div class="title">MEMBERS</div>

    <div class="card">
      <div class="name">KevinSpade</div>
      <div class="desc">YouTube: youtube.com/@kashspade</div>
    </div>

    <div class="card">
      <div class="name">Fizz</div>
      <div class="desc">no channel</div>
    </div>

    <div class="card">
      <div class="name">Akuanta</div>
      <div class="desc">online but silent</div>
    </div>

    <div class="card">
      <div class="name">HailSiguma</div>
      <div class="desc">new member</div>
    </div>

    <div class="card">
      <div class="name">Kenzoo</div>
      <div class="desc">rare online</div>
    </div>
  </div>

  <!-- LINKS -->
  <div class="section">
    <div class="title">COMMUNITY</div>

    <div class="card">
      <div class="name">Discord</div>
      <div class="desc">
        <a href="https://discord.gg/zEq6t4y73N" target="_blank">join server</a>
      </div>
    </div>
  </div>

  <footer>
    © NS — built simple
  </footer>

</div>

</div>

<!-- MUSIC -->
<audio id="bgMusic" loop>
  <source src="/music/bg.mp3" type="audio/mpeg">
</audio>

<script>
function enter() {
  document.getElementById("intro").style.display = "none";

  const main = document.getElementById("main");
  main.style.opacity = "1";
  main.style.transform = "translateY(0)";

  const music = document.getElementById("bgMusic");
  music.volume = 0.2;
  music.play().catch(()=>{});
}
</script>

</body>
</html>
