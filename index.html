<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NS SHIRT</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Inter;
}

body {
  background: linear-gradient(135deg, #07122b, #0a58ff);
  color: white;
  overflow-x: hidden;
}

/* LAYOUT */
.container {
  max-width: 1100px;
  margin: auto;
  padding: 60px 20px;
}

/* HEADER */
.title {
  font-size: 52px;
  letter-spacing: 5px;
}

.sub {
  opacity: 0.7;
  font-size: 12px;
  margin-bottom: 40px;
}

/* DROP AREA */
.drop {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 40px;
  align-items: center;
}

/* IMAGE */
.img-wrap {
  perspective: 1000px;
  display: flex;
  justify-content: center;
}

.img-wrap img {
  width: 320px;
  border-radius: 14px;
  transition: transform 0.1s ease;
  box-shadow: 0 20px 50px rgba(0,0,0,0.4);
}

/* INFO BOX */
.card {
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.15);
  padding: 20px;
  border-radius: 14px;
}

.price {
  margin-top: 10px;
  font-size: 14px;
  opacity: 0.8;
}

.sold {
  text-decoration: line-through;
  opacity: 0.5;
}

/* BUTTONS */
.row {
  display: flex;
  gap: 10px;
  margin-top: 15px;
}

.btn {
  padding: 10px 14px;
  border-radius: 10px;
  background: rgba(255,255,255,0.12);
  border: 1px solid rgba(255,255,255,0.2);
  cursor: pointer;
  transition: 0.2s;
}

.btn:hover {
  transform: translateY(-2px);
}

/* LINKS */
.links {
  margin-top: 50px;
  display: flex;
  gap: 20px;
  font-size: 12px;
  opacity: 0.8;
}

a {
  color: #7fb3ff;
  text-decoration: none;
}
</style>
</head>

<body>

<div class="container">

  <!-- TITLE -->
  <div class="title">NS SHIRT</div>
  <div class="sub">website by: Kashspade</div>

  <!-- DROP -->
  <div class="drop">

    <!-- INFO -->
    <div class="card">
      <h2>LIMITED DROP</h2>

      <div class="price">
        NS SHIRT
      </div>

      <div class="price sold">
        PRICE: $29.99 — SOLD OUT
      </div>

      <div class="row">
        <div class="btn">BUY</div>
        <div class="btn" onclick="toggleMute()">MUTE</div>
      </div>
    </div>

    <!-- IMAGE -->
    <div class="img-wrap">
      <img src="/image/shirt.png" id="shirt">
    </div>

  </div>

  <!-- LINKS -->
  <div class="links">
    <a href="https://discord.gg/zEq6t4y73N">Discord Kashspade</a>
    <a href="https://www.youtube.com/@kashspade">Youtube Kashspade</a>
  </div>

</div>

<!-- AUDIO -->
<audio id="bgMusic" loop>
  <source src="/music/bg.mp3">
</audio>

<script>

/* 🎵 MUSIC */
const music = document.getElementById("bgMusic");
music.volume = 0.4;
music.play().catch(()=>{});

/* MUTE */
function toggleMute(){
  if(music.paused){
    music.play();
  } else {
    music.pause();
  }
}

/* 🧠 3D IMAGE ROTATE */
const img = document.getElementById("shirt");

document.addEventListener("mousemove", (e) => {
  let x = (window.innerWidth/2 - e.clientX) / 30;
  let y = (window.innerHeight/2 - e.clientY) / 30;

  img.style.transform = `rotateY(${x}deg) rotateX(${y}deg)`;
});

</script>

</body>
</html>
