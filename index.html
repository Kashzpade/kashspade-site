<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Spade Website</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
      text-align: center;
    }

    .container {
      margin-top: 120px;
    }

    h1 {
      font-size: 50px;
      color: #38bdf8;
    }

    p {
      font-size: 20px;
      opacity: 0.8;
    }

    .btn {
      margin-top: 20px;
      padding: 12px 25px;
      background: #38bdf8;
      border: none;
      border-radius: 8px;
      color: black;
      font-weight: bold;
      cursor: pointer;
    }

    .btn:hover {
      background: #0ea5e9;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Spade Hosting</h1>
    <p>Website ini berjalan dari PC sendiri 🚀</p>
    <button class="btn">Explore</button>
  </div>

</body>
</html>
