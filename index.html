<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>alvaXzico Store</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Poppins;
}

body{
  background:#0a0f1a;
  color:white;
  overflow-x:hidden;
}

/* ===== MONEY BACKGROUND ===== */
.money{
  position:fixed;
  top:-50px;
  font-size:24px;
  opacity:0.08;
  animation:fall linear infinite;
  pointer-events:none;
}

@keyframes fall{
  0%{transform:translateY(-100px) rotate(0deg);}
  100%{transform:translateY(120vh) rotate(360deg);}
}

/* ===== NAV ===== */
nav{
  display:flex;
  justify-content:space-between;
  padding:20px 40px;
  border-bottom:1px solid #1f2937;
}

.logo{
  color:#c084fc;
  font-weight:600;
}

/* ===== HERO ===== */
.hero{
  text-align:center;
  padding:60px 20px;
}

.hero h1{
  font-size:40px;
}

.hero p{
  color:#aaa;
}

/* ===== CARD ===== */
.card{
  width:320px;
  margin:30px auto;
  background:#111827;
  padding:20px;
  border-radius:12px;
  border:1px solid #1f2937;
}

.price{
  color:#22c55e;
  margin:10px 0;
}

/* BUTTON */
.btn{
  display:block;
  text-align:center;
  background:#25D366;
  padding:10px;
  border-radius:8px;
  color:white;
  text-decoration:none;
  margin-top:10px;
}

/* ===== CAPTCHA ===== */
.captcha{
  margin:20px auto;
  text-align:center;
}

.box{
  display:inline-flex;
  align-items:center;
  gap:10px;
  background:#111827;
  padding:10px 15px;
  border-radius:8px;
  border:1px solid #1f2937;
}

/* MUSIC BTN */
.music{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#111827;
  border:1px solid #1f2937;
  padding:10px;
  border-radius:8px;
  cursor:pointer;
  font-size:12px;
}
</style>
</head>

<body>

<nav>
  <div class="logo">alvaXzico Store</div>
</nav>

<div class="hero">
  <h1>Digital Service Store</h1>
  <p>Fast • Secure • 24/7</p>
</div>

<div class="card">
  <h3>🎰 SOLS RNG AFK</h3>
  <div class="price">1K / JAM</div>

  <p style="color:#aaa;font-size:13px;">
    AFK farming otomatis Roblox
  </p>

  <a class="btn" href="https://wa.me/62895385584661">Order via WA</a>

  <!-- CAPTCHA FAKE -->
  <div class="captcha">
    <div class="box">
      <input type="checkbox" id="bot">
      <label for="bot">I'm not a robot</label>
    </div>
  </div>
</div>

<!-- MUSIC -->
<audio id="bgm" loop>
  <source src="music/bg.mp3" type="audio/mpeg">
</audio>

<div class="music" onclick="toggleMusic()">
  🎵 Music
</div>

<script>
let music = document.getElementById("bgm");
let playing = false;

function toggleMusic(){
  if(!playing){
    music.play();
    playing = true;
  }else{
    music.pause();
    playing = false;
  }
}

/* ===== MONEY SPAWN ===== */
function spawnMoney(){
  const m = document.createElement("div");
  m.classList.add("money");
  m.innerHTML = "💸";

  m.style.left = Math.random() * window.innerWidth + "px";
  m.style.animationDuration = (5 + Math.random() * 5) + "s";

  document.body.appendChild(m);

  setTimeout(()=>{
    m.remove();
  },10000);
}

setInterval(spawnMoney,300);
</script>

</body>
</html>
