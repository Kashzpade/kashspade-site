<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NS SHIRT</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Inter;
}

body {
  background: linear-gradient(135deg, #0a58ff, #eaf3ff);
  color: #0b1220;
  overflow-x: hidden;
}

/* soft luxury glow */
.bg {
  position: fixed;
  inset: 0;
  background:
    radial-gradient(circle at 25% 25%, rgba(255,255,255,0.7), transparent 55%),
    radial-gradient(circle at 75% 70%, rgba(0,120,255,0.25), transparent 60%);
  z-index: -1;
}

/* TOP BAR */
.nav {
  padding: 20px 40px;
  display: flex;
  justify-content: space-between;
  font-size: 12px;
  letter-spacing: 3px;
  color: rgba(0,0,0,0.6);
}

/* HERO */
.container {
  max-width: 1100px;
  margin: auto;
  padding: 60px 20px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 60px;
  align-items: center;
}

/* LEFT */
.title {
  font-size: 72px;
  font-weight: 600;
  letter-spacing: 8px;
}

.subtitle {
  margin-top: 10px;
  font-size: 13px;
  color: rgba(0,0,0,0.6);
}

.rgb {
  margin-top: 12px;
  font-size: 11px;
  letter-spacing: 3px;

  background: linear-gradient(90deg, red, blue, lime, cyan, magenta, red);
  background-size: 300% 100%;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;

  animation: rgb 4s linear infinite;
}

@keyframes rgb {
  0% { background-position: 0%; }
  100% { background-position: 100%; }
}

.desc {
  margin-top: 20px;
  font-size: 14px;
  line-height: 1.6;
  color: rgba(0,0,0,0.7);
  max-width: 420px;
}

/* PRICE */
.price {
  margin-top: 25px;
  font-size: 28px;
  font-weight: 600;
}

.small {
  font-size: 12px;
  color: rgba(0,0,0,0.5);
}

/* BUTTONS */
.actions {
  margin-top: 25px;
  display: flex;
  gap: 10px;
}

.btn {
  padding: 12px 16px;
  border-radius: 12px;
  border: 1px solid rgba(0,0,0,0.2);
  background: rgba(255,255,255,0.5);
  cursor: pointer;
  transition: 0.25s;
  font-size: 12px;
  letter-spacing: 2px;
}

.btn:hover {
  transform: translateY(-2px);
  background: white;
}

/* IMAGE */
.shirt-wrap {
  display: flex;
  justify-content: center;
}

.shirt {
  width: 380px;
  max-width: 100%;
  filter: drop-shadow(0 30px 50px rgba(0,0,0,0.25));
  transform: rotate(-2deg);
  transition: 0.4s;
}

.shirt:hover {
  transform: rotate(0deg) scale(1.05);
}

/* FEATURE STRIP */
.features {
  margin-top: 80px;
  display: flex;
  justify-content: center;
  gap: 60px;
  font-size: 12px;
  color: rgba(0,0,0,0.6);
  letter-spacing: 2px;
}

/* FOOTER */
footer {
  margin-top: 80px;
  text-align: center;
  font-size: 11px;
  color: rgba(0,0,0,0.4);
  padding-bottom: 40px;
}

@media (max-width: 768px) {
  .container {
    grid-template-columns: 1fr;
    text-align: center;
  }

  .desc {
    margin: auto;
  }

  .actions {
    justify-content: center;
  }
}

</style>
</head>

<body>

<div class="bg"></div>

<!-- NAV -->
<div class="nav">
  <div>NS-SPADE</div>
  <div>LIMITED DROP</div>
</div>

<!-- HERO -->
<div class="container">

  <!-- LEFT -->
  <div>
    <div class="title">NS SHIRT</div>

    <div class="rgb">WEBSITE BY: KASHSPADE</div>

    <div class="subtitle">minimal streetwear identity</div>

    <div class="desc">
      NS Shirt adalah representasi dari NS-SPADE.<br>
      clean, simple, built for identity — not hype.
    </div>

    <div class="price">$29.99</div>
    <div class="small">limited drop • no restock</div>

    <div class="actions">
      <button class="btn">BUY NOW</button>
      <button class="btn">DETAILS</button>
    </div>
  </div>

  <!-- RIGHT -->
  <div class="shirt-wrap">
    <img src="image/shirt.png" class="shirt" />
  </div>

</div>

<!-- FEATURES -->
<div class="features">
  <div>PREMIUM QUALITY</div>
  <div>LIMITED EDITION</div>
  <div>NS-SPADE DROP</div>
</div>

<footer>
  © 2026 NS-SPADE • built by kashspade
</footer>

</body>
</html>
