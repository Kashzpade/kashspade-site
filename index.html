<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NS</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Inter", sans-serif;
  scroll-behavior: smooth;
}

html, body {
  height: 100%;
  overflow-x: hidden;
}

body {
  background: linear-gradient(135deg, #0a58ff, #eaf3ff);
  color: #0b1220;
  overflow-y: auto; /* 🔥 FIX SCROLL */
}

/* background */
.bg {
  position: fixed;
  inset: 0;
  background:
    radial-gradient(circle at 30% 30%, rgba(255,255,255,0.5), transparent 50%),
    radial-gradient(circle at 70% 70%, rgba(0,100,255,0.2), transparent 55%);
  z-index: -1;
}

/* INTRO */
.intro {
  position: fixed;
  inset: 0;
  display: flex;
  justify-content: center;
  align-items: center;
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(10px);
  z-index: 999;
}

.btn {
  width: 80px;
  height: 80px;
  border-radius: 50%;
  border: 1px solid rgba(0,0,0,0.15);
  background: rgba(255,255,255,0.4);
  cursor: pointer;
}

/* MAIN */
.main {
  opacity: 0;
  transform: translateY(20px);
  transition: 1s ease;
}

.container {
  max-width: 820px;
  margin: auto;
  padding: 120px 20px 200px;
  text-align: center;
}

/* logo */
.logo {
  font-size: 64px;
  font-weight: 600;
  letter-spacing: 10px;
}

.sub {
  font-size: 12px;
  margin-top: 6px;
  color: rgba(0,0,0,0.6);
}

/* 🔥 RGB TEXT FIX (ANIMATED PROPER) */
.rgb {
  font-size: 11px;
  letter-spacing: 3px;
  font-weight: 600;
  margin-top: 8px;

  background: linear-gradient(90deg, red, blue, lime, cyan, magenta, red);
  background-size: 300% 100%;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;

  animation: rgbMove 3s linear infinite;
}

@keyframes rgbMove {
  0% { background-position: 0% 50%; }
  100% { background-position: 100% 50%; }
}

/* SECTION */
.section {
  margin-top: 80px;
  text-align: left;
}

.title {
  font-size: 10px;
  letter-spacing: 3px;
  color: rgba(0,0,0,0.5);
  margin-bottom: 18px;
}

/* CARD */
.card {
  padding: 14px 16px;
  border-radius: 12px;
  background: rgba(255,255,255,0.45);
  border: 1px solid rgba(0,0,0,0.08);
  margin-bottom: 10px;
}

.card:hover {
  transform: translateX(6px);
  transition: 0.2s;
}

.name {
  font-size: 15px;
  font-weight: 500;
}

/* LINKS */
.linkbox {
  padding: 14px 16px;
  border-radius: 12px;
  background: rgba(255,255,255,0.45);
  border: 1px solid rgba(0,0,0,0.08);
  margin-bottom: 10px;
}

a {
  color: #0a4cff;
  text-decoration: none;
}

/* audio */
audio {
  display: none;
}

</style>
</head>

<body>

<div class="bg"></div>

<!-- INTRO -->
<div class="intro" id="intro">
  <button class="btn" onclick="enter()"></button>
</div>

<!-- MUSIC -->
<audio id="bgMusic" loop>
  <source src="/music/bg.mp3" type="audio/mpeg">
</audio>

<!-- MAIN -->
<div class="main" id="main">

<div class="container">

  <div class="logo">NS</div>
  <div class="sub">Nggak Sehat</div>

  <!-- 🔥 FIXED RGB SIGNATURE -->
  <div class="rgb">WEBSITE BY: KASHSPADE</div>

  <!-- MEMBERS -->
  <div class="section">
    <div class="title">MEMBERS</div>

    <div class="card"><div class="name">KevinSpade</div></div>
    <div class="card"><div class="name">Fizz</div></div>
    <div class="card"><div class="name">Akuanta</div></div>
    <div class="card"><div class="name">HailSiguma</div></div>
    <div class="card"><div class="name">Kenzoo</div></div>

  </div>

  <!-- OTHER -->
  <div class="section">
    <div class="title">OTHER MEMBERS</div>

    <div class="card"><div class="name">RANDOM KID</div></div>
    <div class="card"><div class="name">hanjie707</div></div>
    <div class="card"><div class="name">paris</div></div>
    <div class="card"><div class="name">truechit</div></div>

  </div>

  <!-- LINKS -->
  <div class="section">
    <div class="title">LINKS</div>

    <div class="linkbox">
      Discord → <a href="https://discord.gg/zEq6t4y73N" target="_blank">join</a>
    </div>

    <div class="linkbox">
      YouTube → <a href="https://www.youtube.com/@kashspade" target="_blank">kashspade</a>
    </div>

  </div>

</div>

</div>

<script>
function enter() {
  document.getElementById("intro").style.display = "none";

  const main = document.getElementById("main");
  main.style.opacity = "1";
  main.style.transform = "translateY(0)";

  // 🔥 FIX MUSIC AUTOPLAY
  const music = document.getElementById("bgMusic");
  music.volume = 0.15;
  music.play().catch(() => {
    console.log("autoplay blocked, user must interact first");
  });
}
</script>

</body>
</html>
