<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NS UNLOCK SYSTEM</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Inter;
}

/* BACKGROUND */
body {
  background: linear-gradient(135deg, #07122b, #0a58ff);
  overflow: hidden;
  color: white;
}

/* GHOST MONEY BACKGROUND */
.money {
  position: fixed;
  inset: 0;
  overflow: hidden;
  z-index: 0;
}

.money span {
  position: absolute;
  font-size: 30px;
  opacity: 0.05;
  animation: float 10s linear infinite;
}

@keyframes float {
  from { transform: translateY(100vh) rotate(0deg); }
  to { transform: translateY(-10vh) rotate(360deg); }
}

/* MAIN CONTENT */
.main {
  filter: blur(25px);
  transition: 1s ease;
  pointer-events: none;
  position: relative;
  z-index: 2;
}

.main.unlocked {
  filter: blur(0);
  pointer-events: auto;
}

/* LOCK SCREEN */
.lock {
  position: fixed;
  inset: 0;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  background: rgba(0,0,0,0.55);
  backdrop-filter: blur(12px);
  z-index: 999;
  transition: 1s ease;
}

.lock.hidden {
  opacity: 0;
  pointer-events: none;
}

/* TEXT */
.lock h1 {
  font-size: 16px;
  margin-bottom: 20px;
  letter-spacing: 2px;
  text-align: center;
  color: rgba(255,255,255,0.85);
}

/* RGB BAR */
.bar {
  width: 340px;
  height: 14px;
  border-radius: 999px;
  cursor: pointer;

  background: linear-gradient(90deg,
    red, orange, yellow, lime, cyan, blue, violet, red);

  background-size: 300% 100%;
  animation: rgb 3s linear infinite;

  box-shadow: 0 10px 40px rgba(0,0,0,0.5);
  transition: 0.2s;
}

.bar:hover {
  transform: scale(1.05);
}

@keyframes rgb {
  0% { background-position: 0%; }
  100% { background-position: 100%; }
}

/* STATUS */
.status {
  margin-top: 14px;
  font-size: 11px;
  color: rgba(255,255,255,0.4);
}

/* LAYOUT */
.container {
  padding: 60px;
}

.title {
  font-size: 64px;
  letter-spacing: 6px;
}

.sub {
  font-size: 12px;
  opacity: 0.6;
  margin-top: 5px;
}
</style>
</head>

<body>

<!-- 💸 GHOST MONEY BACKGROUND -->
<div class="money" id="money"></div>

<!-- 🔊 AUDIO -->
<audio id="bgMusic" loop>
  <source src="/music/bg.mp3" type="audio/mpeg">
</audio>

<!-- 🔒 LOCK SCREEN -->
<div class="lock" id="lock">
  <h1 id="text">Click the bar if you believe in NS</h1>

  <div class="bar" onclick="unlock()"></div>

  <div class="status">secure access required</div>
</div>

<!-- MAIN -->
<div class="main" id="main">

  <div class="container">
    <div class="title">NS SHIRT</div>
    <div class="sub">WEBSITE BY: KASHSPADE</div>
  </div>

</div>

<script>

/* 💸 GHOST MONEY GENERATOR */
const money = document.getElementById("money");
const emojis = ["💸","💰","🪙"];

for (let i = 0; i < 40; i++) {
  let span = document.createElement("span");
  span.innerText = emojis[Math.floor(Math.random() * emojis.length)];
  span.style.left = Math.random() * 100 + "vw";
  span.style.top = Math.random() * 100 + "vh";
  span.style.fontSize = (20 + Math.random() * 40) + "px";
  span.style.animationDuration = (8 + Math.random() * 10) + "s";
  money.appendChild(span);
}

/* 🔓 UNLOCK SYSTEM */
let musicStarted = false;

function unlock() {

  document.getElementById("text").innerText =
    "ACCESS GRANTED — NS ONLINE";

  const music = document.getElementById("bgMusic");

  setTimeout(() => {
    document.getElementById("lock").classList.add("hidden");
    document.getElementById("main").classList.add("unlocked");

    /* 🔊 SOUND START (CLICK TRIGGER = WORK 100%) */
    if (!musicStarted) {
      music.volume = 0.4;
      music.play().catch(() => {});
      musicStarted = true;
    }

  }, 700);
}

</script>

</body>
</html>
