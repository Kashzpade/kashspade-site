<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NS SHIRT</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Inter;
}

body {
  background: linear-gradient(135deg, #0a58ff, #eaf3ff);
  min-height: 100vh;
  color: #0b1220;
  overflow-x: hidden;
}

/* background glow */
.bg {
  position: fixed;
  inset: 0;
  background:
    radial-gradient(circle at 30% 30%, rgba(255,255,255,0.6), transparent 55%),
    radial-gradient(circle at 70% 70%, rgba(0,100,255,0.25), transparent 60%);
  z-index: -1;
}

/* layout */
.container {
  max-width: 1000px;
  margin: auto;
  padding: 90px 20px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 50px;
  align-items: center;
}

/* LEFT */
.brand {
  font-size: 68px;
  font-weight: 600;
  letter-spacing: 8px;
}

.rgb {
  margin-top: 10px;
  font-size: 11px;
  letter-spacing: 3px;

  background: linear-gradient(90deg, red, blue, lime, cyan, magenta, red);
  background-size: 300% 100%;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;

  animation: rgb 4s linear infinite;
}

@keyframes rgb {
  0% { background-position: 0%; }
  100% { background-position: 100%; }
}

.desc {
  margin-top: 18px;
  font-size: 14px;
  color: rgba(0,0,0,0.7);
  line-height: 1.6;
}

/* PRICE BOX */
.price {
  margin-top: 20px;
  font-size: 22px;
  font-weight: 600;
}

.small {
  font-size: 12px;
  color: rgba(0,0,0,0.6);
}

/* BUTTON */
.btn {
  margin-top: 22px;
  padding: 11px 16px;
  border-radius: 10px;
  border: 1px solid rgba(0,0,0,0.2);
  background: rgba(255,255,255,0.6);
  cursor: pointer;
  transition: 0.2s;
}

.btn:hover {
  transform: translateY(-2px);
}

/* RIGHT IMAGE */
.shirt-box {
  display: flex;
  justify-content: center;
}

.shirt {
  width: 340px;
  max-width: 100%;
  filter: drop-shadow(0 25px 40px rgba(0,0,0,0.2));
  transform: rotate(-2deg);
  transition: 0.3s;
}

.shirt:hover {
  transform: rotate(0deg) scale(1.03);
}

/* responsive */
@media (max-width: 768px) {
  .container {
    grid-template-columns: 1fr;
    text-align: center;
  }
}

</style>
</head>

<body>

<div class="bg"></div>

<div class="container">

  <!-- LEFT -->
  <div>
    <div class="brand">NS SHIRT</div>

    <div class="rgb">WEBSITE BY: KASHSPADE</div>

    <div class="desc">
      NS Shirt adalah bagian dari brand NS-SPADE.<br>
      simple, clean, streetwear aesthetic.
    </div>

    <div class="price">$29.99</div>
    <div class="small">limited drop • not restocked</div>

    <button class="btn">BUY NOW</button>
  </div>

  <!-- RIGHT -->
  <div class="shirt-box">
    <img src="image/shirt.png" class="shirt" />
  </div>

</div>

</body>
</html>
