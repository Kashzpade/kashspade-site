<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>KashStore</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b1220;
  color:white;
}

/* HEADER */
header{
  padding:15px 25px;
  background:#111a2e;
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-bottom:1px solid #1f2a44;
}

.logo{
  font-weight:bold;
  color:#38bdf8;
}

/* LAYOUT */
.main{
  display:flex;
}

/* PRODUCTS */
.container{
  flex:1;
  padding:25px;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:15px;
}

.card{
  background:#111a2e;
  border:1px solid #1f2a44;
  padding:15px;
  border-radius:12px;
}

.card h3{
  margin:0;
}

.price{
  color:#38bdf8;
  margin:8px 0;
}

button{
  width:100%;
  padding:10px;
  border:none;
  border-radius:8px;
  background:#38bdf8;
  cursor:pointer;
  font-weight:bold;
}

/* CART */
.cart{
  width:280px;
  background:#0f172a;
  border-left:1px solid #1f2a44;
  padding:15px;
  height:100vh;
  overflow:auto;
}

.item{
  background:#111a2e;
  padding:10px;
  margin-bottom:10px;
  border-radius:8px;
}

/* LOGIN */
#auth{
  padding:20px;
  background:#111a2e;
  border-bottom:1px solid #1f2a44;
}

input{
  width:90%;
  padding:8px;
  margin:5px 0;
  border-radius:6px;
  border:none;
}

.checkout{
  background:#22c55e;
  margin-top:10px;
}
</style>

</head>

<body>

<header>
  <div class="logo">KashStore</div>
  <div>Mini Tebex Store</div>
</header>

<!-- LOGIN -->
<div id="auth">
  <input id="email" placeholder="email">
  <input id="password" type="password" placeholder="password">
  <button onclick="login()">Login</button>
</div>

<div class="main">

  <!-- PRODUCTS -->
  <div class="container" id="products"></div>

  <!-- CART -->
  <div class="cart">
    <h3>Cart</h3>
    <div id="cart"></div>

    <button class="checkout" onclick="checkout()">
      Checkout
    </button>
  </div>

</div>

<script>

// ================= CONFIG =================
const SUPABASE_URL = "https://tffyptzlonnalscrrcqc.supabase.co";
const SUPABASE_KEY = "sb_publishable_yS1OzZaeE8KWx0nmmXX2IQ_qzeRzP8U";

// ================= AUTH =================
async function login(){
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const res = await fetch(SUPABASE_URL + "/auth/v1/token?grant_type=password", {
    method:"POST",
    headers:{
      apikey: SUPABASE_KEY,
      "Content-Type":"application/json"
    },
    body: JSON.stringify({ email, password })
  });

  const data = await res.json();

  if(data.access_token){
    localStorage.setItem("email", email);
    alert("Login sukses!");
  } else {
    alert("Login gagal!");
  }
}

// ================= LOAD PRODUCTS =================
async function loadProducts(){
  const res = await fetch(SUPABASE_URL + "/rest/v1/products?select=*", {
    headers:{
      apikey: SUPABASE_KEY,
      Authorization: "Bearer " + SUPABASE_KEY
    }
  });

  const data = await res.json();
  renderProducts(data);
}

// ================= RENDER PRODUCTS =================
function renderProducts(data){
  const el = document.getElementById("products");

  if(!data || data.length === 0){
    el.innerHTML = "<p>No products</p>";
    return;
  }

  el.innerHTML = data.map(p => `
    <div class="card">
      <h3>${p.name}</h3>
      <div class="price">Rp ${p.price}</div>
      <button onclick="addCart('${p.name}', ${p.price})">
        Add to Cart
      </button>
    </div>
  `).join("");
}

// ================= CART =================
let cart = [];

function addCart(name, price){
  cart.push({name, price});
  renderCart();
}

function renderCart(){
  document.getElementById("cart").innerHTML =
    cart.map(i => `
      <div class="item">${i.name} - Rp ${i.price}</div>
    `).join("");
}

// ================= CHECKOUT =================
async function checkout(){
  if(cart.length === 0){
    alert("Cart kosong!");
    return;
  }

  let total = cart.reduce((a,b)=>a+b.price,0);
  let email = localStorage.getItem("email") || "guest";

  await fetch(SUPABASE_URL + "/rest/v1/orders", {
    method:"POST",
    headers:{
      apikey: SUPABASE_KEY,
      Authorization: "Bearer " + SUPABASE_KEY,
      "Content-Type":"application/json",
      Prefer:"return=representation"
    },
    body: JSON.stringify({
      email,
      items: JSON.stringify(cart),
      total,
      status:"pending",
      payment_method:"manual"
    })
  });

  alert("Order dibuat! Total Rp " + total);

  cart = [];
  renderCart();
}

// START
loadProducts();

</script>

</body>
</html>
