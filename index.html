<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NS GOD MODE FINAL</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Inter;
}

/* ❌ HIDE SCROLLBAR BUT STILL SCROLLABLE */
html, body {
  height: 100%;
  overflow-y: auto;
  overflow-x: hidden;
  scrollbar-width: none;
}
body::-webkit-scrollbar {
  width: 0;
}

/* BACKGROUND */
body {
  background: linear-gradient(135deg, #07122b, #0a58ff);
  color: white;
}

/* GHOST MONEY */
.money {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
}

.money span {
  position: absolute;
  opacity: 0.05;
  font-size: 26px;
  animation: float 12s linear infinite;
}

@keyframes float {
  from { transform: translateY(100vh); }
  to { transform: translateY(-10vh); }
}

/* LOCK */
.lock {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(12px);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  z-index: 999;
}

.lock.hidden {
  opacity: 0;
  pointer-events: none;
  transition: 1s ease;
}

.lock h1 {
  font-size: 16px;
  margin-bottom: 20px;
}

/* RGB BAR */
.bar {
  width: 340px;
  height: 14px;
  border-radius: 999px;
  cursor: pointer;
  background: linear-gradient(90deg, red, orange, yellow, lime, cyan, blue, violet, red);
  background-size: 300% 100%;
  animation: rgb 3s linear infinite;
}

@keyframes rgb {
  0% { background-position: 0%; }
  100% { background-position: 100%; }
}

/* MAIN */
.main {
  filter: blur(25px);
  pointer-events: none;
  transition: 1s ease;
  position: relative;
  z-index: 2;
}

.main.unlocked {
  filter: blur(0);
  pointer-events: auto;
}

/* CONTAINER */
.container {
  max-width: 1100px;
  margin: auto;
  padding: 60px 20px;
}

/* TITLE */
.title {
  font-size: 58px;
  letter-spacing: 5px;
}

.sub {
  font-size: 12px;
  opacity: 0.7;
  margin-bottom: 20px;
}

/* CARD */
.section {
  margin-top: 30px;
}

.section h2 {
  font-size: 10px;
  opacity: 0.6;
  letter-spacing: 2px;
  margin-bottom: 10px;
}

.card {
  padding: 12px 14px;
  border-radius: 12px;
  background: rgba(255,255,255,0.08);
  margin-bottom: 10px;
  border: 1px solid rgba(255,255,255,0.1);
}

/* BUY + SOUND */
.buy-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-top: 10px;
}

.buy {
  padding: 10px 14px;
  border-radius: 10px;
  background: rgba(255,255,255,0.15);
  border: 1px solid rgba(255,255,255,0.2);
  cursor: not-allowed;
  text-decoration: line-through;
}

.sound {
  padding: 10px 12px;
  border-radius: 10px;
  cursor: pointer;
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.2);
}

/* GAME TAG */
.game {
  position: fixed;
  bottom: 10px;
  left: 10px;
  font-size: 10px;
  opacity: 0.5;
}
</style>
</head>

<body>

<!-- MONEY -->
<div class="money" id="money"></div>

<!-- AUDIO -->
<audio id="bgMusic" loop>
  <source src="/music/bg.mp3">
</audio>

<!-- LOCK -->
<div class="lock" id="lock">
  <h1 id="text">Click the bar if you love NS</h1>
  <div class="bar" onclick="unlock()"></div>
</div>

<!-- MAIN -->
<div class="main" id="main">

<div class="container">

  <div class="title">NS SHIRT</div>
  <div class="sub">WEBSITE BY: KASHSPADE</div>

  <!-- LIMITED -->
  <div class="section">
    <h2>LIMITED DROP</h2>
    <div class="card">
      NS Shirt — $29.99
      <div class="buy-row">
        <div class="buy">BUY</div>
        <div class="sound" onclick="toggleSound()">mute</div>
      </div>
    </div>
  </div>

  <!-- MEMBER -->
  <div class="section">
    <h2>MEMBER</h2>
    <div class="card">KevinSpade</div>
    <div class="card">Fizz</div>
    <div class="card">Akuanta</div>
    <div class="card">HailSiguma</div>
    <div class="card">Kenzoo</div>
  </div>

  <!-- RANDOM KID -->
  <div class="section">
    <h2>RANDOM KID</h2>
    <div class="card">Paris</div>
    <div class="card">hanjie707</div>
    <div class="card">TrueChit</div>
  </div>

</div>
</div>

<!-- GAME TAG -->
<div class="game">game: NS ONLINE</div>

<script>

/* MONEY */
const money = document.getElementById("money");
const em = ["💸","💰","🪙"];

for(let i=0;i<35;i++){
  let s=document.createElement("span");
  s.innerText = em[Math.floor(Math.random()*em.length)];
  s.style.left = Math.random()*100+"vw";
  s.style.top = Math.random()*100+"vh";
  s.style.animationDuration = (8+Math.random()*10)+"s";
  money.appendChild(s);
}

/* AUDIO */
const music = document.getElementById("bgMusic");
let playing = false;

function unlock(){
  document.getElementById("text").innerText = "ACCESS GRANTED — NS ONLINE";

  setTimeout(()=>{
    document.getElementById("lock").classList.add("hidden");
    document.getElementById("main").classList.add("unlocked");

    music.volume = 0.4;
    music.play().catch(()=>{});
    playing = true;
  },600);
}

/* MUTE */
function toggleSound(){
  if(!playing) return;

  if(music.paused){
    music.play();
  } else {
    music.pause();
  }
}
</script>

</body>
</html>
