<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>KashStore</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0a0f1c;
  color:white;
}

header{
  padding:20px;
  background:#111a2e;
  display:flex;
  justify-content:space-between;
}

.container{
  padding:20px;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:15px;
}

.card{
  background:#111a2e;
  padding:15px;
  border-radius:10px;
}

button{
  width:100%;
  margin-top:10px;
  padding:10px;
  background:#38bdf8;
  border:none;
  cursor:pointer;
}

.cart{
  position:fixed;
  right:0;
  top:0;
  width:250px;
  height:100%;
  background:#0f172a;
  padding:15px;
}
</style>

</head>

<body>

<header>
  <h1>KashStore</h1>
</header>

<div class="container" id="products"></div>

<div class="cart">
  <h3>Cart</h3>
  <div id="cart"></div>
</div>

<script>

// ================= CONFIG =================
const SUPABASE_URL = "https://tffyptzlonnalscrrcqc.supabase.co";
const SUPABASE_KEY = "sb_publishable_yS1OzZaeE8KWx0nmmXX2IQ_qzeRzP8U";

// ================= CART =================
let cart = [];

// ================= LOAD PRODUCTS =================
async function loadProducts(){
  const res = await fetch(SUPABASE_URL + "/rest/v1/products?select=*", {
    headers:{
      apikey: SUPABASE_KEY,
      Authorization: "Bearer " + SUPABASE_KEY
    }
  });

  const data = await res.json();
  render(data);
}

// ================= RENDER =================
function render(data){
  const el = document.getElementById("products");

  if(!data || data.length === 0){
    el.innerHTML = "<p>No products</p>";
    return;
  }

  el.innerHTML = data.map(p => `
    <div class="card">
      <h3>${p.name}</h3>
      <p>Rp ${p.price}</p>
      <button onclick="add('${p.name}', ${p.price})">Add</button>
    </div>
  `).join("");
}

// ================= ADD TO CART =================
function add(name, price){
  cart.push({name, price});
  renderCart();
}

// ================= CART UI =================
function renderCart(){
  document.getElementById("cart").innerHTML =
    cart.map(i => `<div>${i.name} - Rp ${i.price}</div>`).join("");
}

// ================= START =================
loadProducts();

</script>

</body>
</html>
