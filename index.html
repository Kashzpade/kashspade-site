<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>alvaXzico Marketplace</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Poppins;
}

body{
  background:#070a12;
  color:white;
  overflow-x:hidden;
}

/* 💸 MONEY BG */
.money{
  position:fixed;
  top:-50px;
  font-size:18px;
  opacity:0.06;
  animation:fall linear infinite;
  pointer-events:none;
}

@keyframes fall{
  0%{transform:translateY(-100px);}
  100%{transform:translateY(120vh);}
}

/* NAV */
nav{
  display:flex;
  justify-content:space-between;
  padding:20px 40px;
  border-bottom:1px solid #1f2937;
  position:sticky;
  top:0;
  background:#070a12;
}

.logo{
  color:#c084fc;
  font-weight:600;
}

input{
  padding:8px 12px;
  border-radius:8px;
  border:none;
  outline:none;
  background:#111827;
  color:white;
}

/* HERO */
.hero{
  text-align:center;
  padding:40px 20px;
}

.hero h1{
  font-size:38px;
}

.hero p{
  color:#aaa;
}

/* FILTER */
.filters{
  display:flex;
  justify-content:center;
  gap:10px;
  margin:20px 0;
  flex-wrap:wrap;
}

.filters button{
  padding:8px 12px;
  border-radius:8px;
  border:1px solid #1f2937;
  background:#111827;
  color:#aaa;
  cursor:pointer;
  transition:.2s;
}

.filters button:hover{
  border-color:#a855f7;
  color:white;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
  padding:20px 40px 60px;
}

/* CARD */
.card{
  background:#111827;
  border:1px solid #1f2937;
  border-radius:14px;
  padding:20px;
  transition:.2s;
}

.card:hover{
  transform:translateY(-6px);
  border-color:#a855f7;
}

.price{
  color:#22c55e;
  margin:10px 0;
}

.tag{
  font-size:12px;
  color:#888;
}

/* BUTTON */
.btn{
  display:block;
  margin-top:10px;
  padding:10px;
  background:#25D366;
  border-radius:8px;
  text-align:center;
  color:white;
  text-decoration:none;
}
</style>
</head>

<body>

<script>
function spawnMoney(){
  const m=document.createElement("div");
  m.classList.add("money");
  m.innerHTML="💸";
  m.style.left=Math.random()*window.innerWidth+"px";
  m.style.animationDuration=(5+Math.random()*5)+"s";
  document.body.appendChild(m);
  setTimeout(()=>m.remove(),10000);
}
setInterval(spawnMoney,300);
</script>

<nav>
  <div class="logo">alvaXzico Market</div>
  <input type="text" placeholder="Search service...">
</nav>

<section class="hero">
  <h1>Premium Game Marketplace</h1>
  <p>Fast • Trusted • 24/7 Service</p>
</section>

<div class="filters">
  <button>All</button>
  <button>Roblox</button>
  <button>Minecraft</button>
  <button>Boost</button>
</div>

<section class="grid">

  <div class="card">
    <div class="tag">Roblox</div>
    <h3>SOLS RNG AFK</h3>
    <div class="price">1K / JAM</div>
    <p>AFK farming service</p>
    <a class="btn" href="https://wa.me/62895385584661">Order</a>
  </div>

  <div class="card">
    <div class="tag">Boost</div>
    <h3>Rank Push Service</h3>
    <div class="price">5K+</div>
    <p>Fast rank boosting</p>
    <a class="btn" href="https://wa.me/62895385584661">Order</a>
  </div>

  <div class="card">
    <div class="tag">Setup</div>
    <h3>Server Setup</h3>
    <div class="price">10K+</div>
    <p>Minecraft / Discord setup</p>
    <a class="btn" href="https://wa.me/62895385584661">Order</a>
  </div>

</section>

</body>
</html>
