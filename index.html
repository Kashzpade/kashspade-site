<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NS GOD MODE</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Inter;
}

/* SCROLL HIDE */
html,body{
  overflow-x:hidden;
  scrollbar-width:none;
}
body::-webkit-scrollbar{display:none;}

/* BACKGROUND BLUE + LUXURY */
body{
  background: radial-gradient(circle at top,#3aa0ff40,transparent 40%),
              radial-gradient(circle at bottom,#ffffff10,transparent 50%),
              linear-gradient(135deg,#050b1f,#0a58ff);
  color:white;
}

/* 💸 MONEY */
.money{
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:0;
}
.money span{
  position:absolute;
  opacity:.06;
  font-size:22px;
  animation:float 12s linear infinite;
}
@keyframes float{
  from{transform:translateY(100vh);}
  to{transform:translateY(-10vh);}
}

/* MAIN */
.container{
  max-width:1100px;
  margin:auto;
  padding:70px 20px;
  position:relative;
  z-index:2;
}

.title{
  font-size:58px;
  letter-spacing:6px;
}

.sub{
  font-size:12px;
  opacity:.6;
  margin-bottom:30px;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:60px;
  align-items:center;
}

/* CARD */
.card{
  background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.12);
  padding:22px;
  border-radius:16px;
  backdrop-filter:blur(10px);
}

.price{
  font-size:14px;
  opacity:.8;
}

.sold{
  text-decoration:line-through;
  opacity:.4;
}

/* LIVE */
.live{
  margin-top:10px;
  font-size:11px;
  opacity:.7;
}

/* COUNTDOWN */
.countdown{
  margin-top:10px;
  font-size:12px;
  opacity:.8;
}

/* BTN */
.row{
  display:flex;
  gap:10px;
  margin-top:18px;
}

.btn{
  padding:10px 14px;
  border-radius:10px;
  border:1px solid rgba(255,255,255,.15);
  background:rgba(255,255,255,.08);
  cursor:pointer;
}

/* IMAGE */
.img-wrap{
  perspective:1200px;
  display:flex;
  justify-content:center;
}

.img-wrap img{
  width:340px;
  border-radius:16px;
  transition:.15s;
  cursor:zoom-in;
  box-shadow:0 30px 80px rgba(0,0,0,.4);
}

/* LIST */
.section{
  margin-top:50px;
}

.section h2{
  font-size:10px;
  opacity:.6;
  letter-spacing:3px;
}

.list{
  display:flex;
  flex-direction:column;
  gap:8px;
  margin-top:10px;
}

.item{
  padding:10px 12px;
  background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.1);
  border-radius:10px;
  font-size:13px;
}

/* LINKS */
.links{
  margin-top:60px;
  display:flex;
  gap:20px;
  font-size:12px;
  opacity:.8;
}

a{
  color:#8ec5ff;
  text-decoration:none;
  display:flex;
  gap:6px;
  align-items:center;
}

.icon{width:14px;}
</style>
</head>

<body>

<!-- 🌈 UNLOCK BAR (INI YANG KAMU MAU) -->
<div id="unlock" style="
position:fixed;
inset:0;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
background:rgba(0,0,0,.75);
backdrop-filter:blur(10px);
z-index:9999;
">

  <div style="color:white;margin-bottom:15px;font-size:14px;">
    CLICK THE BAR IF YOU LOVE NS
  </div>

  <div onclick="unlockSite()" style="
  width:280px;
  height:18px;
  border-radius:999px;
  background:linear-gradient(90deg,red,orange,yellow,green,cyan,blue,purple);
  cursor:pointer;
  box-shadow:0 0 20px rgba(255,255,255,.3);
  "></div>

</div>

<!-- 💸 MONEY -->
<div class="money" id="money"></div>

<div class="container">

<div class="title">NS GOD MODE</div>
<div class="sub">WEBSITE BY: KASHSPADE</div>

<div class="grid">

  <!-- STORE -->
  <div class="card">
    <div class="price">NS SHIRT</div>
    <div class="price sold">PRICE: $29.99 — SOLD OUT</div>

    <div class="live">LIVE BUYERS: <span id="buyers">128</span></div>

    <div class="countdown">
      NEXT DROP: <span id="timer">24:00:00</span>
    </div>

    <div class="row">
      <div class="btn">BUY</div>
      <div class="btn" onclick="toggleSound()">MUTE</div>
    </div>
  </div>

  <!-- IMAGE -->
  <div class="img-wrap">
    <img src="/image/shirt.png" id="shirt">
  </div>

</div>

<!-- MEMBER -->
<div class="section">
  <h2>MEMBER</h2>
  <div class="list">
    <div class="item">KevinSpade</div>
    <div class="item">Fizz</div>
    <div class="item">Akuanta</div>
    <div class="item">HailSiguma</div>
    <div class="item">Kenzoo</div>
  </div>
</div>

<!-- RANDOM KID -->
<div class="section">
  <h2>RANDOM KID</h2>
  <div class="list">
    <div class="item">Paris</div>
    <div class="item">hanjie707</div>
    <div class="item">TrueChit</div>
  </div>
</div>

<!-- LINKS -->
<div class="links">
  <a href="https://discord.gg/zEq6t4y73N">Discord</a>
  <a href="https://www.youtube.com/@kashspade">Youtube</a>
</div>

</div>

<!-- AUDIO -->
<audio id="bgMusic" loop>
  <source src="/music/bg.mp3">
</audio>

<script>

/* UNLOCK SITE + SOUND */
const music = document.getElementById("bgMusic");
music.volume = 0.35;

function unlockSite(){
  document.getElementById("unlock").style.display="none";
  music.play();
}

/* MUTE */
function toggleSound(){
  if(music.paused) music.play();
  else music.pause();
}

/* MONEY */
const money=document.getElementById("money");
const em=["💸","💰","🪙"];

for(let i=0;i<40;i++){
  let s=document.createElement("span");
  s.innerText=em[Math.floor(Math.random()*em.length)];
  s.style.left=Math.random()*100+"vw";
  s.style.top=Math.random()*100+"vh";
  s.style.animationDuration=(8+Math.random()*10)+"s";
  money.appendChild(s);
}

/* BUYERS */
let b=128;
setInterval(()=>{
  b+=Math.random()<0.7?1:2;
  document.getElementById("buyers").innerText=b;
},3000);

/* COUNTDOWN 24H LOOP */
let t=86400;
setInterval(()=>{
  t--;
  if(t<=0)t=86400;

  let h=String(Math.floor(t/3600)).padStart(2,"0");
  let m=String(Math.floor((t%3600)/60)).padStart(2,"0");
  let s=String(t%60).padStart(2,"0");

  document.getElementById("timer").innerText=`${h}:${m}:${s}`;
},1000);

/* 3D IMAGE */
const img=document.getElementById("shirt");

document.addEventListener("mousemove",(e)=>{
  let x=(innerWidth/2-e.clientX)/40;
  let y=(innerHeight/2-e.clientY)/40;
  img.style.transform=`rotateY(${x}deg) rotateX(${y}deg)`;
});

</script>

</body>
</html>
